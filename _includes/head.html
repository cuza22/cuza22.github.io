<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% if page.use_math %}
    {% include mathjax.html %}
  {% endif %}
  <title>
    {% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}
  </title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  
  <!-- favicon for all browsers -->
  <link rel="icon" type="image/png" sizes="36x36"  href="/assets/img/favicon/android-icon-36x36.png">
  <link rel="icon" type="image/png" sizes="48x48"  href="/assets/img/favicon/android-icon-48x48.png">
  <link rel="icon" type="image/png" sizes="72x72"  href="/assets/img/favicon/android-icon-72x72.png">
  <link rel="icon" type="image/png" sizes="96x96"  href="/assets/img/favicon/android-icon-96x96.png">
  <link rel="icon" type="image/png" sizes="144x144"  href="/assets/img/favicon/android-icon-144x144.png">
  <link rel="icon" type="image/png" sizes="192x192"  href="/assets/img/favicon/android-icon-192x192.png">
  <link rel="apple-touch-icon" sizes="57x57" href="/assets/img/favicon/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="/assets/img/favicon/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="/assets/img/favicon/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="/assets/img/favicon/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="/assets/img/favicon/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/assets/img/favicon/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/assets/img/favicon/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/assets/img/favicon/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/assets/img/favicon/favicon-96x96.png">
  <link rel="manifest" href="/assets/img/favicon/manifest.json">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" sizes="70x70" content="/assets/img/favicon/ms-icon-70x70.png">
  <meta name="msapplication-TileImage" sizes="144x144" content="/assets/img/favicon/ms-icon-144x144.png">
  <meta name="msapplication-TileImage" sizes="150x150" content="/assets/img/favicon/ms-icon-150x150.png">
  <meta name="msapplication-TileImage" sizes="310x310" content="/assets/img/favicon/ms-icon-310x310.png">
  <meta name="theme-color" content="#ffffff">

  <!-- evil icon -->

  <link rel="stylesheet" href="{{'/assets/evil-icons.min.css' | prepend:site.baseurl }}">
  <script src="{{'/assets/evil-icons.min.js' | prepend:site.baseurl }}"></script>

  <!-- todo: include this into main.css -->

  <link rel="stylesheet" href="{{ '/css/main.css' | prepend: site.baseurl }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | prepend: site.baseurl | prepend: site.url }}">
</head>
