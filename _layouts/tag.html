---
layout: default
---

<div class="tag-container">
<h1>🍊 {{ page.title | default: page.name }}</h1>
    <div id="tag-content" role="main">
        <ul id="post-list">
            {% for post in site.posts %}
                {% if post.tags contains page.name %}
                    {% include postcard.html %}
                {% endif %}
            {% endfor %}
        </ul>
    </div>
</div>
